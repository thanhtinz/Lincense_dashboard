version: '3.9'

# =============================================================================
# LICENSE PLATFORM — Production Docker Compose
# =============================================================================
# Usage:
#   cp .env.example .env && nano .env   # fill all values
#   docker-compose up -d
#   docker-compose logs -f
# =============================================================================

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: license_platform
      POSTGRES_USER: license_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lp_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U license_user -d license_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    # No port exposure — only accessible internally

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lp_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - lp_internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No port exposure — only accessible internally

  # ── API Server ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ../license-platform
      dockerfile: Dockerfile
    container_name: lp_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://license_user:${POSTGRES_PASSWORD}@postgres:5432/license_platform
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      RSA_PRIVATE_KEY: ${RSA_PRIVATE_KEY}
      RSA_PUBLIC_KEY: ${RSA_PUBLIC_KEY}
      AES_MASTER_KEY: ${AES_MASTER_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME:-Super Admin}
      DASHBOARD_URL: https://${DOMAIN}
      RATE_LIMIT_VERIFY_RPM: ${RATE_LIMIT_VERIFY_RPM:-10}
      NONCE_WINDOW_SECONDS: ${NONCE_WINDOW_SECONDS:-300}
    networks:
      - lp_internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Dashboard ──────────────────────────────────────────────────────────────
  dashboard:
    build:
      context: ../license-dashboard
      dockerfile: Dockerfile
    container_name: lp_dashboard
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: https://${DOMAIN}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      API_URL: http://api:3001
      NEXT_PUBLIC_API_URL: https://${DOMAIN}
    networks:
      - lp_internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Nginx reverse proxy + SSL termination ──────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: lp_nginx
    restart: unless-stopped
    depends_on:
      - api
      - dashboard
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    networks:
      - lp_internal
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 60s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ── Certbot SSL (auto-renew) ────────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: lp_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot --webroot-path=/var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"

  # ── DB Backup ──────────────────────────────────────────────────────────────
  backup:
    image: postgres:16-alpine
    container_name: lp_backup
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      AWS_ACCESS_KEY_ID: ${BACKUP_AWS_KEY:-}
      AWS_SECRET_ACCESS_KEY: ${BACKUP_AWS_SECRET:-}
      AWS_DEFAULT_REGION: ${BACKUP_AWS_REGION:-ap-southeast-1}
    volumes:
      - ./scripts/backup.sh:/backup.sh:ro
      - backup_data:/backups
    networks:
      - lp_internal
    entrypoint: >
      /bin/sh -c "
      apk add --no-cache aws-cli curl > /dev/null 2>&1;
      trap exit TERM;
      while :; do
        sh /backup.sh;
        sleep 86400 & wait $${!};
      done"

volumes:
  postgres_data:
  redis_data:
  certbot_www:
  certbot_certs:
  backup_data:

networks:
  lp_internal:
    driver: bridge
    internal: false   # nginx needs external for SSL challenge
