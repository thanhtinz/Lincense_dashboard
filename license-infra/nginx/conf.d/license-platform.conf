# =============================================================================
# License Platform — Nginx Virtual Host
# Replace YOUR_DOMAIN with your actual domain, e.g. license.yourdomain.com
# =============================================================================

# ── HTTP → HTTPS redirect + ACME challenge ────────────────────────────────
server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ─────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name YOUR_DOMAIN;

    # ── SSL ────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security Headers ───────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"                                          always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header X-XSS-Protection          "1; mode=block"                                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"      always;

    # ── Request limits ─────────────────────────────────────────────────────
    client_max_body_size 1m;    # license verify requests are tiny

    # ── /api/v1/verify — product-facing, tightest rate limit ──────────────
    location /api/v1/verify {
        limit_req zone=verify_zone burst=5 nodelay;

        proxy_pass         http://api:3001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout    10s;
        proxy_read_timeout    10s;
    }

    # ── /api/v1/auth/login — brute-force protection ────────────────────────
    location /api/v1/auth/login {
        limit_req zone=login_zone burst=3 nodelay;

        proxy_pass         http://api:3001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── /api/* — all other admin API endpoints ─────────────────────────────
    location /api/ {
        limit_req zone=admin_zone burst=20 nodelay;

        proxy_pass         http://api:3001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # ── /health — uptime monitoring endpoint ──────────────────────────────
    location /health {
        proxy_pass       http://api:3001;
        proxy_set_header Host $host;
        access_log       off;
    }

    # ── / — Next.js Dashboard ─────────────────────────────────────────────
    location / {
        proxy_pass         http://dashboard:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # ── Block common exploit paths ─────────────────────────────────────────
    location ~* \.(php|asp|aspx|jsp|cgi)$ { return 444; }
    location ~ /\. { deny all; }
}
