user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────
    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;   # hide nginx version

    # ── Gzip ───────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css application/json application/javascript
        text/xml application/xml application/xml+rss text/javascript;

    # ── Rate limiting zones ────────────────────────────────────────────────
    # Applied at nginx level BEFORE reaching API (extra layer)
    limit_req_zone $binary_remote_addr zone=verify_zone:10m rate=15r/m;
    limit_req_zone $binary_remote_addr zone=admin_zone:10m  rate=60r/m;
    limit_req_zone $binary_remote_addr zone=login_zone:10m  rate=5r/m;

    limit_req_status 429;
    limit_conn_zone $binary_remote_addr zone=conn_zone:10m;
    limit_conn conn_zone 20;

    # ── Include vhosts ─────────────────────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
